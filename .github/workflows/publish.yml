name: Publish to npm

# Publishes harvest-scan to npm using OIDC Trusted Publishing — no tokens.
# Trigger by pushing a v* tag, or run manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@latest
          npm -v

      - name: Show OIDC claim (for trusted-publisher config)
        run: |
          echo "owner/repo : $GITHUB_REPOSITORY"
          echo "workflow_ref : $GITHUB_WORKFLOW_REF"

      - name: Install dependencies
        run: npm install

      - name: Publish (OIDC trusted publishing)
        run: npm publish --access public
        env:
          # Empty (not unset) token forces npm to fall back to the OIDC flow
          # instead of using setup-node's placeholder _authToken. See npm/cli#8730.
          NODE_AUTH_TOKEN: ''
          NPM_CONFIG_PROVENANCE: 'true'
