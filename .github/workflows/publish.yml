name: Publish to npm

# Publishes harvest-scan to npm using OIDC Trusted Publishing — no tokens.
# Trigger by pushing a v* tag, or run manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: intentionally no registry-url — it writes an .npmrc with
      # always-auth + an empty _authToken that npm prefers over OIDC (npm/cli#8730).
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare npm for OIDC (no auth placeholder)
        run: |
          npm install -g npm@latest
          npm config set registry https://registry.npmjs.org/
          npm -v
          npm config get registry

      - name: Install dependencies
        run: npm install

      - name: Publish (OIDC trusted publishing)
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: 'true'
