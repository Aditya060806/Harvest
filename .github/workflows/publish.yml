name: Publish to npm

# Publishes harvest-scan to npm using OIDC Trusted Publishing — no tokens.
# Trigger by pushing a v* tag, or run manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Publish (OIDC trusted publishing)
        run: npm publish --provenance --access public
