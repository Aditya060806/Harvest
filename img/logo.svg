<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Harvest logo">
  <title>Harvest</title>
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB43D"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="carrot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF1DE"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7CCB34"/>
      <stop offset="1" stop-color="#3F8F1F"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#22A356"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#badge)"/>
  <rect x="16" y="16" width="480" height="480" rx="120" fill="#FFFFFF" opacity="0.06"/>

  <!-- subtle scan ring -->
  <circle cx="248" cy="272" r="176" fill="none" stroke="#FFFFFF" stroke-opacity="0.20"
          stroke-width="10" stroke-dasharray="26 22" stroke-linecap="round"/>

  <!-- leaves -->
  <path d="M256 214 C248 156 248 128 256 100 C264 128 264 156 256 214 Z" fill="url(#leaf)"/>
  <path d="M250 210 C222 172 210 152 202 126 C226 140 242 170 258 208 Z" fill="url(#leaf)"/>
  <path d="M262 210 C290 172 302 152 310 126 C286 140 270 170 254 208 Z" fill="url(#leaf)"/>

  <!-- carrot body -->
  <path d="M206 216 Q256 196 306 216 L272 404 Q256 442 240 404 Z" fill="url(#carrot)"/>

  <!-- ridges -->
  <g stroke="#F59E0B" stroke-width="9" stroke-linecap="round" opacity="0.75">
    <line x1="230" y1="252" x2="256" y2="262"/>
    <line x1="240" y1="300" x2="266" y2="310"/>
    <line x1="248" y1="348" x2="270" y2="357"/>
  </g>

  <!-- passed check badge -->
  <circle cx="360" cy="360" r="58" fill="url(#check)" stroke="#FFFFFF" stroke-width="10"/>
  <path d="M334 360 L352 379 L388 341" fill="none" stroke="#FFFFFF"
        stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
